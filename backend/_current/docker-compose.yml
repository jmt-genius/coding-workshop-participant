version: '3.8'

services:
  db:
    image: postgres:15
    container_name: luminous_db
    restart: always
    environment:
      - POSTGRES_USER=luminous
      - POSTGRES_PASSWORD=luminous_noir
      - POSTGRES_DB=luminous_hq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
